# @Updatetime 2024/07/09 UTC/GMT +8

mode: rule
log-level: info

dns:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fake-ip-filter:
    - '+.music.163.com'
    - 'musicapi.taihe.com'
    - 'music.taihe.com'
    - '+.y.qq.com'
    - '+.music.tc.qq.com'
    - 'aqqmusic.tc.qq.com'
    - '+.stream.qqmusic.qq.com'
  skip-cert-verify: true
  
subscribe-url: 订阅链接
proxy-providers:
  Matrix:
    url: 订阅链接
    interval: 600
    
proxies: []

proxy-groups:
  - name: Proxy
    type: select
    proxies: [香港, 美国, 日本, 新加坡, 台湾]
    
  - filter: (🇭🇰)|(港)|(香港)|(HK)|(Hong)
    name: 香港
    type: url-test
    include-all: true
    
  - filter: 🇺🇸)|(States)|(US)|(美国)|(美國)
    include-all: true
    name: 美国
    type: url-test
    
  - filter: (🇯🇵)|(Japan)|(JP)|(日本)
    include-all: true
    name: 日本
    type: url-test
    
  - filter: (🇸🇬)|(坡)|(Singapore)|(SG)|(狮城)
    include-all: true
    name: 新加坡
    type: url-test
    
  - filter: (🇹🇼)|(台)|(Tai)|(TW)|(台湾)|(台灣)
    include-all: true
    name: 台湾
    type: url-test
    
rules:
  - RULE-SET,广告拦截,REJECT
  - RULE-SET,Telegram,新加坡
  - RULE-SET,Apple,Proxy
  - RULE-SET,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
  
rule-providers:
  广告拦截:
    behavior: domain
    interval: 86400
    url: https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Stash/ruleset/Advertising.yaml
    
  Telegram:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    
  Apple:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Stash/ruleset/Apple.yaml
    
  LAN:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/yuk1uno/yuki-repo/main/Rule/LAN/LAN.yaml
