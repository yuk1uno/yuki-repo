# @Updatetime 2024/07/09 UTC/GMT +8


mode: rule
log-level: info
dns:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fake-ip-filter:
    - '+.music.163.com'
    - 'musicapi.taihe.com'
    - 'music.taihe.com'
    - '+.y.qq.com'
    - '+.music.tc.qq.com'
    - 'aqqmusic.tc.qq.com'
    - '+.stream.qqmusic.qq.com'
  skip-cert-verify: true

proxies: []
proxy-groups:
- name: Proxy
  type: select
  proxies: []
- name: 香港节点
    filter: "香港|港|🇭🇰|HK|(?i)Hong"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/HK.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

  - name: 台湾节点
    filter: "台湾|台|🇹🇼|TW|(?i)Taiwan"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/TW.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

  - name: 日本节点
    filter: "日本|日|🇯🇵|JP|(?i)Japan"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/JP.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

  - name: 韩国节点
    filter: "韩国|韩|🇰🇷|KR|(?i)Korea"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/KR.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

  - name: 狮城节点
    filter: "新加坡|新|🇸🇬|SG|(?i)Singapore"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/SG.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

  - name: 美国节点
    filter: "美国|美|🇺🇸|US|(?i)States"
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/US.png
    interval: 120
    lazy: true
    tolerance: 50
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    include-all: true

rules:
  - RULE-SET,广告拦截,REJECT
  - RULE-SET,Telegram,Proxy
  - RULE-SET,Apple,Proxy
  - RULE-SET,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy

rule-providers:
  广告拦截:
    behavior: domain
    interval: 86400
    url: https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Stash/ruleset/Advertising.yaml

  Telegram:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml

  Apple:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Stash/ruleset/Apple.yaml

  LAN:
    behavior: classical
    interval: 86400
    url: https://raw.githubusercontent.com/yuk1uno/yuki-repo/main/Rule/LAN/LAN.yaml
